<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }} — История запросов</title>
  <link rel="stylesheet" href="/static/style.css?v=20260505g" />
</head>
<body>
  <main class="app-shell">
    <header class="hero" aria-label="History header">
      <div class="hero-copy">
        <p class="hero-eyebrow">История запросов и ответов</p>
        <h1 class="app-title">PostgreSQL RAG Assistant</h1>
        <p class="app-subtitle">Просматривайте последние ответы, режимы и источники.</p>
      </div>
      <div class="hero-actions">
        <a class="btn btn-secondary btn-compact" href="/">Новый запрос</a>
      </div>
    </header>

    <section class="card history-card">
      <div class="history-header">
        <div>
          <h2 class="history-title">Последние запросы</h2>
          <p class="panel-subtitle">Технический статус, режим ответа и источники для каждого запроса.</p>
        </div>
        <div class="history-actions">
          <button id="refresh-btn" class="btn btn-secondary btn-compact" type="button">Обновить</button>
          <a class="btn btn-secondary btn-compact" href="/">Новый запрос</a>
        </div>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>
  </main>

  <script src="/static/history.js?v=20260505g"></script>
</body>
</html>
